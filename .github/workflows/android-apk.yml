name: Android APK Build

on:
  push:
    branches: [ main ]
    paths:
      - "apps/bluetrace-education-mobile/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/bluetrace-education-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle -p . assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bluetrace-education-debug-apk
          path: apps/bluetrace-education-mobile/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
